services:
  - type: web
    name: app-entregas
    env: docker
    dockerfilePath: ./Dockerfile
    region: ohio
    plan: starter
    buildCommand: ""
    startCommand: "node backend/src/server.js"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        value: "REPLACE_WITH_A_SECURE_SECRET"
      - key: MONGODB_URI
        value: "MONGODB_URI_REMOVED"
      - key: USE_MONGODB
        value: "true"
      - key: MONGO_COLLECTION
        value: "basegeomars"
      - key: REACT_APP_MAINTENANCE_MODE
        value: "true"
      - key: REACT_APP_MAINTENANCE_MESSAGE
        value: "O sistema está em manutenção. Voltamos em breve."
